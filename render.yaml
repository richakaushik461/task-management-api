services:
  # Backend API Service
  - type: web
    name: task-management-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        value: mongodb+srv://richakaushik461_db_user:MFjb5UFsipp0BUk8@cluster0.xxxcxtf.mongodb.net/taskmanager?retryWrites=true&w=majority&appName=Cluster0
      - key: JWT_SECRET
        value: my-super-secret-jwt-key-2024-primetrade-assignment
      - key: JWT_REFRESH_SECRET
        value: my-refresh-token-secret-key-2024
      - key: JWT_EXPIRE
        value: 1h
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        value: https://task-manager-frontend.onrender.com
      - key: RATE_LIMIT_WINDOW
        value: 15
      - key: RATE_LIMIT_MAX
        value: 100
      - key: LOG_LEVEL
        value: info

  # Frontend Static Site
  - type: static
    name: task-manager-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://task-management-api.onrender.com/api/v1
